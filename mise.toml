[env]
_.path = ["./node_modules/.bin"]

[tools]
# Environments
bun = "1.3.14"
aube = "1.22.0"
# Linters & Formatters
hk = "1.48.0"
stylua = "2.5.2"
pkl = "0.31.1"

[deps.bun-aube]
description = "Automatically install dependencies via aube & bun's lockfile."
sources = ["package.json", "bun.lock"]
outputs = ["node_modules/"]
# Because aube's output lockfile has bugs,
# we use `bun install --lockfile-only` to generate a lockfile
run = "bun install --lockfile-only && aube install"
auto = true

[tasks."dev:webpack-default"]
run = "webpack serve --config webpack.default.config.js --mode production"

[tasks."dev:webpack-custom"]
run = "webpack serve --config webpack.custom.config.js --mode production"

[tasks."dev:webpack-custom-with-size"]
run = "webpack serve --config webpack.custom-with-size.config.js --mode production"

[tasks."dev:vite-default"]
run = "bun run ./node_modules/vite/bin/vite.js --config vite.default.config.js dev"

[tasks."dev:vite-custom"]
run = "bun run ./node_modules/vite/bin/vite.js --config vite.custom.config.js dev"

[tasks."dev:vite-custom-with-size"]
run = "bun run ./node_modules/vite/bin/vite.js --config vite.custom-with-size.config.js dev"

[tasks."dev:vite7-default"]
run = "bun run ./node_modules/vite7/bin/vite.js --config vite7.default.config.js dev"

[tasks."dev:vite7-custom"]
run = "bun run ./node_modules/vite7/bin/vite.js --config vite7.custom.config.js dev"

[tasks.build]
run = { task = "build:*" }

[tasks."build:webpack-default"]
run = "webpack build --config webpack.default.config.js --mode production"

[tasks."build:webpack-custom"]
run = "webpack build --config webpack.custom.config.js --mode production"

[tasks."build:webpack-custom-with-size"]
run = "webpack build --config webpack.custom-with-size.config.js --mode production"

[tasks."build:vite-default"]
run = "bun run ./node_modules/vite/bin/vite.js --config vite.default.config.js build"

[tasks."build:vite-custom"]
run = "bun run ./node_modules/vite/bin/vite.js --config vite.custom.config.js build"

[tasks."build:vite-custom-with-size"]
run = "bun run ./node_modules/vite/bin/vite.js --config vite.custom-with-size.config.js build"

[tasks."build:vite7-default"]
run = "bun run ./node_modules/vite7/bin/vite.js --config vite7.default.config.js build"

[tasks."build:vite7-custom"]
run = "bun run ./node_modules/vite7/bin/vite.js --config vite7.custom.config.js build"

[tasks."start:webpack-default"]
# TODO: Use correct command
run = "webpack start --config webpack.default.config.js --mode production"

[tasks."start:webpack-custom"]
# TODO: Use correct command
run = "webpack start --config webpack.custom.config.js --mode production"

[tasks."start:webpack-custom-with-size"]
# TODO: Use correct command
run = "webpack start --config webpack.custom-with-size.config.js --mode production"

[tasks."start:vite-default"]
run = "bun run ./node_modules/vite/bin/vite.js --config vite.default.config.js preview"

[tasks."start:vite-custom"]
run = "bun run ./node_modules/vite/bin/vite.js --config vite.custom.config.js preview"

[tasks."start:vite-custom-with-size"]
run = "bun run ./node_modules/vite/bin/vite.js --config vite.custom-with-size.config.js preview"

[tasks."start:vite7-default"]
run = "bun run ./node_modules/vite7/bin/vite.js --config vite7.default.config.js preview"

[tasks."start:vite7-custom"]
run = "bun run ./node_modules/vite7/bin/vite.js --config vite7.custom.config.js preview"

[tasks.inspect]
run = { task = "inspect:*" }

[tasks."inspect:webpack-default"]
run = "webpack inspect --config webpack.default.config.js --mode production -- --analyze"

[tasks."inspect:webpack-custom"]
run = "webpack inspect --config webpack.custom.config.js --mode production -- --analyze"

[tasks."inspect:webpack-custom-with-size"]
run = "webpack inspect --config webpack.custom-with-size.config.js --mode production -- --analyze"

[tasks."inspect:vite-default"]
env = { INSPECT = true }
run = "bun run ./node_modules/vite/bin/vite.js --config vite.default.config.js build"

[tasks."inspect:vite-custom"]
env = { INSPECT = true }
run = "bun run ./node_modules/vite/bin/vite.js --config vite.custom.config.js build"

[tasks."inspect:vite-custom-with-size"]
env = { INSPECT = true }
run = "bun run ./node_modules/vite/bin/vite.js --config vite.custom-with-size.config.js build"

[tasks."inspect:vite7-default"]
env = { INSPECT = true }
run = "bun run ./node_modules/vite7/bin/vite.js --config vite7.default.config.js build"

[tasks."inspect:vite7-custom"]
env = { INSPECT = true }
run = "bun run ./node_modules/vite7/bin/vite.js --config vite7.custom.config.js build"

[tasks.check]
run = "hk check --all"

[tasks.fix]
run = "hk fix --all"
